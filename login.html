<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SchoolConnect</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #1e40af 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(249, 115, 22, 0.1);
            border-radius: 50%;
            top: -150px;
            right: -150px;
            animation: float 8s ease-in-out infinite;
        }
        
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 30px 25px 25px;
            text-align: center;
            position: relative;
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,96C1248,75,1344,53,1392,42.7L1440,32L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
        }
        
        .logo-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo-circle i {
            font-size: 36px;
            color: white;
        }
        
        .login-header h2 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 6px;
        }
        
        .login-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            margin: 0;
        }
        
        .login-body {
            padding: 35px 30px;
        }
        
        .welcome-text {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .welcome-text h3 {
            color: #1f2937;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .welcome-text p {
            color: #6b7280;
            font-size: 13px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-label {
            display: block;
            color: #374151;
            font-weight: 500;
            font-size: 13px;
            margin-bottom: 6px;
        }
        
        .form-control {
            width: 100%;
            height: 46px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 0 15px;
            font-size: 14px;
            transition: all 0.3s;
            background: #f9fafb;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }
        
        .password-toggle:hover {
            color: #f97316;
        }
        
        .form-footer {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        
        .forgot-link {
            color: #3b82f6;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .forgot-link:hover {
            color: #f97316;
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
        }
        
        .alert {
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        
        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        .btn-login.loading .spinner {
            display: block;
        }
        
        .btn-login.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2>SchoolConnect</h2>
                <p>Système de Gestion Scolaire Intelligente</p>
            </div>
            
            <div class="login-body">
                <div class="welcome-text">
                    <h3>Bienvenue !</h3>
                    <p>Connectez-vous pour accéder à votre espace</p>
                </div>
                
                <div id="alert" class="alert"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email ou Nom d'utilisateur</label>
                        <input type="text" id="username" class="form-control" placeholder="admin@ecole.com ou LAVO2025" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Mot de passe</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="far fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-footer">
                        <a href="mot-de-passe-oublie.html" class="forgot-link">Mot de passe oublié ?</a>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <span class="btn-text">
                            <i class="fas fa-sign-in-alt"></i>
                            Se connecter
                        </span>
                        <span class="spinner"></span>
                    </button>
                </form>
                
                <div class="footer-text">
                    © 2025 SchoolConnect Guinea • Version 1.0
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const btn = document.querySelector('.btn-login');
            const alert = document.getElementById('alert');
            
            alert.style.display = 'none';
            btn.classList.add('loading');
            
            setTimeout(() => {
                btn.classList.remove('loading');
                
                // Connexion via email ou username
                if (username.toLowerCase().includes('superadmin') || username.toLowerCase().includes('admin@')) {
                    showSuccess('Connexion réussie ! Redirection...');
                    setTimeout(() => {
                        window.location.href = 'pages/super-admin-dashboard.html';
                    }, 1000);
                } else if (username.toLowerCase().includes('lavo') || username.toLowerCase().includes('admin')) {
                    showSuccess('Connexion réussie ! Redirection...');
                    setTimeout(() => {
                        window.location.href = 'pages/admin-ecole-dashboard.html';
                    }, 1000);
                } else {
                    showError('Identifiant ou mot de passe incorrect');
                }
            }, 1500);
        });
        
        function showSuccess(message) {
            const alert = document.getElementById('alert');
            alert.className = 'alert alert-success';
            alert.textContent = message;
            alert.style.display = 'block';
        }
        
        function showError(message) {
            const alert = document.getElementById('alert');
            alert.className = 'alert alert-danger';
            alert.textContent = message;
            alert.style.display = 'block';
        }
    </script>
</body>
</html>
