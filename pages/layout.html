<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolConnect - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Navbar Top -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-graduation-cap"></i> SchoolConnect
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="userName"></span>
                <button class="btn btn-outline-light btn-sm" onclick="AuthService.logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar">
        <nav class="nav flex-column">
            <a class="nav-link active" href="dashboard.html">
                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
            </a>
            <a class="nav-link" href="eleves.html">
                <i class="fas fa-user-graduate me-2"></i> Élèves
            </a>
            <a class="nav-link" href="classes.html">
                <i class="fas fa-chalkboard me-2"></i> Classes
            </a>
            <a class="nav-link" href="parents.html">
                <i class="fas fa-users me-2"></i> Parents
            </a>
            <a class="nav-link" href="presences.html">
                <i class="fas fa-clipboard-check me-2"></i> Présences
            </a>
            <a class="nav-link" href="sms.html">
                <i class="fas fa-sms me-2"></i> SMS
            </a>
            <a class="nav-link" href="alertes.html">
                <i class="fas fa-bell me-2"></i> Alertes
            </a>
            <a class="nav-link" href="parametres.html">
                <i class="fas fa-cog me-2"></i> Paramètres
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container-fluid p-4" id="mainContent">
            <!-- Le contenu sera injecté ici -->
        </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Vérifier auth
        AuthService.requireAuth();
        
        // Afficher nom utilisateur
        const user = AuthService.getUser();
        document.getElementById('userName').textContent = `${user.prenom} ${user.nom}`;
    </script>
</body>
</html>
