<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présences - SchoolConnect</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Notre CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="main-content">
        <div class="page-content">
            
            <!-- Filtres -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" id="filterDate" value="2025-03-15">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Classe</label>
                            <select class="form-select" id="filterClasse">
                                <option value="">Toutes les classes</option>
                                <option value="CP-A">CP-A</option>
                                <option value="CE1-A">CE1-A</option>
                                <option value="CE2-A">CE2-A</option>
                                <option value="CM1-A">CM1-A</option>
                                <option value="CM2-A">CM2-A</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Statut</label>
                            <select class="form-select" id="filterStatut">
                                <option value="">Tous</option>
                                <option value="present">Présents</option>
                                <option value="absent">Absents</option>
                                <option value="retard">Retards</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <button class="btn btn-success w-100" onclick="exportExcel()">
                                <i class="fas fa-file-excel"></i>
                                Exporter Excel
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Stats du jour -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="stat-card fade-in">
                        <div class="stat-card-content">
                            <div class="stat-info">
                                <h6>Présents</h6>
                                <div class="stat-value text-success">412</div>
                                <p class="stat-label">91.5%</p>
                            </div>
                            <div class="stat-icon green">
                                <i class="fas fa-check-circle"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card fade-in" style="animation-delay: 0.1s">
                        <div class="stat-card-content">
                            <div class="stat-info">
                                <h6>Absents</h6>
                                <div class="stat-value text-danger">28</div>
                                <p class="stat-label">6.2%</p>
                            </div>
                            <div class="stat-icon red">
                                <i class="fas fa-times-circle"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card fade-in" style="animation-delay: 0.2s">
                        <div class="stat-card-content">
                            <div class="stat-info">
                                <h6>Retards</h6>
                                <div class="stat-value text-warning">10</div>
                                <p class="stat-label">2.2%</p>
                            </div>
                            <div class="stat-icon" style="background: linear-gradient(135deg, #fbbf24, #f59e0b);">
                                <i class="fas fa-clock"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card fade-in" style="animation-delay: 0.3s">
                        <div class="stat-card-content">
                            <div class="stat-info">
                                <h6>Taux Présence</h6>
                                <div class="stat-value text-primary">91.5%</div>
                                <p class="stat-label">450 élèves</p>
                            </div>
                            <div class="stat-icon blue">
                                <i class="fas fa-chart-pie"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Graphique semaine -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title">
                                <i class="fas fa-chart-line"></i>
                                Évolution de la Semaine
                            </h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartPresences" height="80"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Table présences -->
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">
                        <i class="fas fa-clipboard-list"></i>
                        Détails des Présences du <span id="dateTitle">15 Mars 2025</span>
                    </h5>
                </div>
                <div class="card-body">
                    <!-- Filtres rapides tableau -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-white">
                                    <i class="fas fa-search"></i>
                                </span>
                                <input type="text" 
                                       class="form-control" 
                                       id="searchEleve" 
                                       placeholder="Rechercher un élève...">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" id="tableFilterClasse">
                                <option value="">Toutes les classes</option>
                                <option value="CP-A">CP-A</option>
                                <option value="CE1-A">CE1-A</option>
                                <option value="CE2-A">CE2-A</option>
                                <option value="CM1-A">CM1-A</option>
                                <option value="CM2-A">CM2-A</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" id="tableFilterStatut">
                                <option value="">Tous les statuts</option>
                                <option value="present">Présents</option>
                                <option value="absent">Absents</option>
                                <option value="retard">Retards</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Élève</th>
                                    <th>Classe</th>
                                    <th>Statut</th>
                                    <th>Heure Entrée</th>
                                    <th>Heure Sortie</th>
                                    <th>SMS</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="presencesTableBody">
                                <!-- Sera rempli par JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <!-- Modal Détails Scan -->
    <div class="modal fade" id="scanDetailsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-qrcode"></i>
                        Détails des Scans
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h6 id="scanEleveNom" class="mb-3"></h6>
                    <div id="scanList">
                        <!-- Sera rempli par JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Notre JS -->
    <script src="../assets/js/components.js"></script>
    
    <script>
        // Initialiser la page
        initPage({
            userType: 'admin_ecole',
            pageTitle: 'Présences',
            user: {
                nom: 'Admin',
                prenom: 'Lavoisier',
                email: 'admin@lavo2025.schoolconnect.gn',
                ecole: { nom: 'École Lavoisier' }
            }
        });
        
        // ============ DONNÉES FAKE ============
        const fakePresences = [
            {
                id: 1,
                eleve: 'Diallo Mamadou',
                classe: 'CM2-A',
                statut: 'present',
                heure_entree: '08:15',
                heure_sortie: '12:30',
                sms: 'Aucun',
                scans: [
                    { type: 'Entrée', heure: '08:15' },
                    { type: 'Sortie', heure: '12:30' }
                ]
            },
            {
                id: 2,
                eleve: 'Camara Fatoumata',
                classe: 'CE2-A',
                statut: 'present',
                heure_entree: '08:10',
                heure_sortie: '12:25',
                sms: 'Aucun',
                scans: [
                    { type: 'Entrée', heure: '08:10' },
                    { type: 'Sortie', heure: '12:25' }
                ]
            },
            {
                id: 3,
                eleve: 'Bah Ibrahima',
                classe: 'CP-A',
                statut: 'absent',
                heure_entree: '-',
                heure_sortie: '-',
                sms: 'Envoyé 08:45',
                scans: []
            },
            {
                id: 4,
                eleve: 'Sy Aissatou',
                classe: 'CM1-A',
                statut: 'retard',
                heure_entree: '09:15',
                heure_sortie: '12:35',
                sms: 'Envoyé 09:15',
                scans: [
                    { type: 'Entrée (Retard)', heure: '09:15' },
                    { type: 'Sortie', heure: '12:35' }
                ]
            }
        ];
        
        let filteredPresences = [...fakePresences];
        
        // ============ GRAPHIQUE ============
        function loadChart() {
            const ctx = document.getElementById('chartPresences').getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lun 10', 'Mar 11', 'Mer 12', 'Jeu 13', 'Ven 14', 'Auj'],
                    datasets: [
                        {
                            label: 'Présents',
                            data: [425, 430, 428, 420, 415, 412],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Absents',
                            data: [25, 20, 22, 30, 35, 28],
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });
        }
        
        // ============ RENDER TABLE ============
        function renderPresences() {
            const tbody = document.getElementById('presencesTableBody');
            
            if (filteredPresences.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-4">
                            <i class="fas fa-search fa-3x text-muted mb-3 d-block"></i>
                            <p class="text-muted">Aucune présence trouvée avec ces critères</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filteredPresences.map(p => `
                <tr>
                    <td><strong>${p.eleve}</strong></td>
                    <td><span class="badge bg-primary">${p.classe}</span></td>
                    <td>
                        ${p.statut === 'present' ? '<span class="badge badge-success">Présent</span>' : ''}
                        ${p.statut === 'absent' ? '<span class="badge badge-danger">Absent</span>' : ''}
                        ${p.statut === 'retard' ? '<span class="badge badge-warning">Retard</span>' : ''}
                    </td>
                    <td>${p.heure_entree}</td>
                    <td>${p.heure_sortie}</td>
                    <td><small class="text-muted">${p.sms}</small></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewScans(${p.id})">
                            <i class="fas fa-qrcode"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        // ============ FILTRES ============
        function applyFilters() {
            const search = document.getElementById('searchEleve').value.toLowerCase();
            const classe = document.getElementById('tableFilterClasse').value;
            const statut = document.getElementById('tableFilterStatut').value;
            
            filteredPresences = fakePresences.filter(p => {
                const matchSearch = p.eleve.toLowerCase().includes(search);
                const matchClasse = !classe || p.classe === classe;
                const matchStatut = !statut || p.statut === statut;
                return matchSearch && matchClasse && matchStatut;
            });
            
            renderPresences();
        }
        
        // Appliquer les filtres au changement
        document.getElementById('searchEleve').addEventListener('input', applyFilters);
        document.getElementById('tableFilterClasse').addEventListener('change', applyFilters);
        document.getElementById('tableFilterStatut').addEventListener('change', applyFilters);
        
        // Filtres du haut (globaux - gardés pour compatibilité)
        document.getElementById('filterClasse').addEventListener('change', function() {
            document.getElementById('tableFilterClasse').value = this.value;
            applyFilters();
        });
        document.getElementById('filterStatut').addEventListener('change', function() {
            document.getElementById('tableFilterStatut').value = this.value;
            applyFilters();
        });
        
        // ============ ACTIONS ============
        function viewScans(id) {
            const p = fakePresences.find(x => x.id === id);
            
            document.getElementById('scanEleveNom').textContent = `${p.eleve} (${p.classe})`;
            
            const scanList = document.getElementById('scanList');
            if (p.scans.length === 0) {
                scanList.innerHTML = '<p class="text-muted">Aucun scan enregistré pour cet élève aujourd\'hui.</p>';
            } else {
                scanList.innerHTML = p.scans.map(scan => `
                    <div class="alert alert-info mb-2">
                        <strong>${scan.type}</strong> : ${scan.heure}
                    </div>
                `).join('');
            }
            
            new bootstrap.Modal(document.getElementById('scanDetailsModal')).show();
        }
        
        function exportExcel() {
            showToast('Export Excel en cours...', 'info');
            setTimeout(() => {
                showToast('Fichier Excel généré avec succès !', 'success');
            }, 1500);
        }
        
        // ============ INIT ============
        loadChart();
        renderPresences();
    </script>
</body>
</html>
